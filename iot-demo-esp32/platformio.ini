; ==============================================================================
; SAMDEMO - ESP32 UART-Bluetooth ブリッジ
; ==============================================================================
; Phase 7: ESP32 は GR-SAKURA の UART データを BT/USB 経由で PC に転送
;
; 接続方式の切り替え:
;   pio run -e usb_mode --target upload   USB Serial
;   pio run -e bt_mode  --target upload   Bluetooth SPP
; ==============================================================================

[base]
platform  = espressif32
board     = esp32dev
framework = arduino
monitor_speed = 115200
upload_port   = COM4
monitor_port  = COM4

; ── USB Serial モード（開発・デバッグ向け）────────────────────────────────────
[env:usb_mode]
extends     = base
build_flags = -DUSB_MODE

; ── Bluetooth SPP モード ────────────────────────────────────────────────────
[env:bt_mode]
extends     = base
build_flags = -DUSE_BLUETOOTH
