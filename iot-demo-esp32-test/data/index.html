<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SAMDEMO - 温度制御</title>
<script src="/chart.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#12141a;--panel:#1a1d25;--border:#2a2e38;--txt:#c8ccd4;--dim:#5a6070;
--amber:#f0a030;--amber-dim:#805818;--red:#e84040;--green:#40c060;--cyan:#40b8d0;
--font:'JetBrains Mono','Consolas','Courier New',monospace
}
body{background:var(--bg);color:var(--txt);font:13px/1.5 var(--font);min-height:100vh}
.hdr{background:var(--panel);border-bottom:2px solid var(--amber-dim);padding:10px 16px;display:flex;align-items:center;gap:12px}
.hdr h1{font-size:15px;color:var(--amber);letter-spacing:2px;text-transform:uppercase}
.hdr .dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse 2s infinite}
.hdr .dot.on{background:var(--green);animation:none}
.hdr .status{margin-left:auto;font-size:11px;color:var(--dim)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.main{max-width:900px;margin:0 auto;padding:10px;display:flex;flex-direction:column;gap:10px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:12px}
.card h2{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:6px}
.reading{display:flex;align-items:baseline;gap:6px;margin:6px 0}
.reading .val{font-size:28px;font-weight:700;color:var(--amber)}
.reading .unit{font-size:12px;color:var(--dim)}
.reading.sm .val{font-size:18px}
.readings-row{display:flex;gap:16px;flex-wrap:wrap}
.bar-wrap{background:#0d0f14;border:1px solid var(--border);border-radius:2px;height:22px;position:relative;overflow:hidden;margin:4px 0}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--amber-dim),var(--amber));transition:width .5s;border-radius:1px}
.bar-label{position:absolute;right:6px;top:2px;font-size:11px;color:var(--txt)}
.ctrl-row{display:flex;gap:10px;flex-wrap:wrap;align-items:stretch}
.ctrl-row .card{flex:1;min-width:200px}
.row{display:flex;gap:8px;align-items:center;margin:4px 0;flex-wrap:wrap}
.row label{font-size:11px;color:var(--dim);min-width:28px}
.inp{background:#0d0f14;border:1px solid var(--border);color:var(--amber);font:13px var(--font);padding:4px 8px;width:72px;border-radius:2px;text-align:right}
.inp:focus{outline:none;border-color:var(--amber)}
.btn{background:var(--border);color:var(--txt);border:1px solid #3a3e48;font:11px var(--font);padding:5px 14px;cursor:pointer;border-radius:2px;text-transform:uppercase;letter-spacing:1px;transition:all .15s}
.btn:hover{background:#3a3e48;border-color:var(--dim)}
.btn:active{transform:scale(.97)}
.btn.amber{background:var(--amber-dim);color:#fff;border-color:var(--amber)}
.btn.amber:hover{background:var(--amber)}
.btn.red{background:#5a1818;color:#fcc;border-color:var(--red);flex:1;padding:10px;font-size:13px;font-weight:700}
.btn.red:hover{background:var(--red);color:#fff}
.btn.green{background:#184a28;color:#cfc;border-color:var(--green);flex:1;padding:10px;font-size:13px;font-weight:700}
.btn.green:hover{background:var(--green);color:#fff}
.estop-row{display:flex;gap:8px;margin-top:8px}
.chart-wrap{height:180px;position:relative}
canvas{width:100%!important}
</style>
</head>
<body>
<div class="hdr">
<div class="dot" id="wsDot"></div>
<h1>SAMDEMO 温度制御</h1>
<span class="status" id="wsStatus">切断中</span>
</div>
<div class="main">

<div class="card">
<h2>センサーデータ</h2>
<div class="readings-row">
<div class="reading"><span class="val" id="vTemp">--</span><span class="unit">℃ 温度</span></div>
<div class="reading sm"><span class="val" id="vHumi">--</span><span class="unit">% 湿度</span></div>
<div class="reading sm"><span class="val" id="vPres">--</span><span class="unit">hPa 気圧</span></div>
</div>
<div style="margin-top:4px">
<div class="bar-wrap"><div class="bar-fill" id="pwmBar" style="width:0%"></div><span class="bar-label" id="pwmVal">PWM 0 / 255</span></div>
</div>
</div>

<div class="card">
<h2>リアルタイムグラフ</h2>
<div class="chart-wrap"><canvas id="chart"></canvas></div>
</div>

<div class="ctrl-row">
<div class="card">
<h2>目標温度設定</h2>
<div class="reading sm"><span class="val" id="vSP">--</span><span class="unit">℃ 現在の目標</span></div>
<div class="row">
<label>SP</label>
<input class="inp" id="inSP" type="number" step="0.5" value="28.0">
<span class="unit">℃</span>
<button class="btn amber" onclick="applySP()">適用</button>
</div>
</div>

<div class="card">
<h2>制御</h2>
<div class="estop-row">
<button class="btn red" onclick="sendCmd('stop')">緊急停止</button>
<button class="btn green" onclick="sendCmd('start')">運転再開</button>
</div>
</div>
</div>

</div>
<script>
const MAX=60,labels=[],tData=[],hData=[],pData=[];
const ctx=document.getElementById('chart').getContext('2d');
const chart=new Chart(ctx,{type:'line',data:{labels,datasets:[
{label:'温度 ℃',data:tData,borderColor:'#f0a030',backgroundColor:'rgba(240,160,48,.1)',fill:true,tension:.3,pointRadius:0,borderWidth:1.5},
{label:'湿度 %',data:hData,borderColor:'#40b8d0',backgroundColor:'transparent',tension:.3,pointRadius:0,borderWidth:1},
{label:'気圧 hPa',data:pData,borderColor:'#5a6070',backgroundColor:'transparent',tension:.3,pointRadius:0,borderWidth:1,yAxisID:'y2'}
]},options:{responsive:true,maintainAspectRatio:false,animation:{duration:300},
plugins:{legend:{display:true,labels:{color:'#5a6070',font:{size:10},boxWidth:12,padding:8}}},
scales:{x:{display:false},y:{position:'left',grid:{color:'#1e2230'},ticks:{color:'#5a6070',font:{size:10}}},
y2:{position:'right',grid:{drawOnChartArea:false},ticks:{color:'#3a3e38',font:{size:10}}}},
interaction:{intersect:false,mode:'index'}}});

let ws,reconn;
function connect(){
const h=location.host||'192.168.4.1';
ws=new WebSocket('ws://'+h+'/ws');
ws.onopen=()=>{document.getElementById('wsDot').classList.add('on');document.getElementById('wsStatus').textContent='接続中';};
ws.onclose=()=>{document.getElementById('wsDot').classList.remove('on');document.getElementById('wsStatus').textContent='再接続中...';clearTimeout(reconn);reconn=setTimeout(connect,2000);};
ws.onmessage=e=>{try{handle(JSON.parse(e.data))}catch(x){}};
}
function handle(d){
if(d.type==='sensor'){
document.getElementById('vTemp').textContent=d.temp!=null?d.temp.toFixed(1):'--';
document.getElementById('vHumi').textContent=d.humi!=null?d.humi.toFixed(1):'--';
document.getElementById('vPres').textContent=d.pres!=null?d.pres.toFixed(1):'--';
if(d.pwm!=null)setPWM(d.pwm);
const t=new Date().toLocaleTimeString('ja',{hour12:false});
labels.push(t);tData.push(d.temp);hData.push(d.humi);pData.push(d.pres);
if(labels.length>MAX){labels.shift();tData.shift();hData.shift();pData.shift();}
chart.update();
}
if(d.type==='ctrl'){
if(d.pwm!=null)setPWM(d.pwm);
if(d.sp!=null)document.getElementById('vSP').textContent=d.sp.toFixed(1);
if(d.vtemp!=null)document.getElementById('vTemp').textContent=d.vtemp.toFixed(1);
}
}
function setPWM(v){
const p=Math.round(v/255*100);
document.getElementById('pwmBar').style.width=p+'%';
document.getElementById('pwmVal').textContent='PWM '+v+' / 255';
}
function send(o){if(ws&&ws.readyState===1)ws.send(JSON.stringify(o));}
function sendCmd(c){send({type:'cmd',cmd:c});}
function applySP(){send({type:'cmd',cmd:'set_target',sp:parseFloat(document.getElementById('inSP').value)});}
connect();
</script>
</body>
</html>
